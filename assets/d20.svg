<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="d20grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- D20 shape (icosahedron face) -->
  <polygon points="50,5 95,30 95,70 50,95 5,70 5,30" fill="url(#d20grad)" stroke="#d4af37" stroke-width="2"/>
  <!-- Inner lines -->
  <line x1="50" y1="5" x2="50" y2="45" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <line x1="95" y1="30" x2="50" y2="45" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <line x1="5" y1="30" x2="50" y2="45" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <line x1="5" y1="70" x2="50" y2="55" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <line x1="95" y1="70" x2="50" y2="55" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="95" x2="50" y2="55" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="45" x2="50" y2="55" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <!-- 20 text -->
  <text x="50" y="54" font-family="serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#d4af37" filter="url(#glow)">20</text>
</svg>
